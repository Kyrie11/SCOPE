seed: 13
output:
  dataset_dir: outputs/datasets/scope_womd_waymax
data:
  split: train
  source: womd
  womd_version: "1.1.0"
  data_path: null
  max_num_objects: 128
  history_horizon_s: 2.0
  future_horizon_s: 8.0
  dt: 0.1
  include_sdc_paths: true
  allow_synthetic: false
  synthetic_count: 8
  relevant_agents: 12
  neighbor_count: 8
  agent_types: [vehicle]
candidates:
  candidate_count: 32
  timing_shifts_s: [-1.0, -0.5, 0.0, 0.5, 1.0, 1.5]
  speed_multipliers: [0.75, 0.9, 1.0, 1.1]
  lateral_durations_s: [2.0, 3.0, 4.0, 5.0]
  lateral_midpoint_shifts_s: [-0.5, 0.0, 0.5]
  planner_proposals: 8
  max_repair_candidates: 8
rollout:
  backend: waymax
  fallback_to_reactive: true
  policy_family_id: idm_default
  multi_policy: false
  policy_family:
    neutral_idm:
      desired_time_headway: 1.5
      min_gap: 2.0
      max_accel: 2.0
      comfortable_decel: 2.0
      yield_bias: 0.0
    conservative_idm:
      desired_time_headway: 2.0
      min_gap: 4.0
      max_accel: 1.5
      comfortable_decel: 1.5
      yield_bias: 0.6
    assertive_idm:
      desired_time_headway: 1.0
      min_gap: 1.0
      max_accel: 2.5
      comfortable_decel: 3.0
      yield_bias: -0.5
